name: MonocularSLAMDemo
options:
  bundleIdPrefix: com.example
targets:
  MonocularSLAMDemo:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.MonocularSLAMDemo
        PRODUCT_NAME: MonocularSLAMDemo
        SWIFT_VERSION: 6.0
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_NSCameraUsageDescription: This app uses the camera for AR world tracking.
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: This app uses your location for GPS and heading in the geo sensor demo.
        INFOPLIST_KEY_NSMotionUsageDescription: This app uses motion sensors to show attitude, IMU, and barometer data.
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        CODE_SIGN_STYLE: Automatic
    info:
      path: Info.plist
      properties:
        UIApplicationSupportsIndirectInputEvents: YES
